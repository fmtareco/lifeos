# ── Default (dev) ────────────────────────────────────────
spring:
  application:
    name: lifeOS

  # Activate 'dev' profile locally so application-dev.yml supplies credentials.
  # Railway overrides this with 'prod' via the Procfile.
  profiles:
    active: dev

  datasource:
    url: jdbc:h2:file:./data/lifeos-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jackson:
    deserialization:
      fail-on-unknown-properties: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

# ── App credentials (must be set via env vars — no defaults in production) ──
app:
  security:
    username: ${APP_USER}
    password: ${APP_PASS}

logging:
  level:
    com.lifeos: DEBUG
    org.springframework.web: INFO

---
# ── Production profile  (--spring.profiles.active=prod) ──
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # Use individual vars that Railway injects — avoids jdbc:// prefix mangling
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    driver-class-name: org.postgresql.Driver
    username: ${PGUSER}
    password: ${PGPASSWORD}

  jackson:
    deserialization:
      fail-on-unknown-properties: false

  jpa:
    hibernate:
      ddl-auto: update        # safe for personal app; use Flyway for team projects
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}
